spring.application.name=ports

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zephyr_capital}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

openai.api.key=${OPENAI_API_KEY:}
scheduled.enabled=true

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.keepaliveTime=300000

logging.level.org.springframework.web=DEBUG
logging.level.root=INFO
logging.level.com.zephyr.ports=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

server.port=${SERVER_PORT:8080}

server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.domain=${APP_DOMAIN:localhost}

recaptcha.secret=${RECAPTCHA_SECRET:}
security.jwt.secret-key=${JWT_SECRET_KEY:}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
